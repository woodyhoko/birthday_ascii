<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday — ASCII Cake</title>
<style>
  html,body{margin:0;height:100%;background:radial-gradient(120% 120% at 50% 0,#13182e 0,#05060a 60%);overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;flex-direction:column;
       font-family:"Cascadia Code","Consolas",ui-monospace,monospace}
  #scene{text-align:center}
  #art{font-size:clamp(9px,2.7vw,17px);line-height:1.04;white-space:pre;margin:0;user-select:none;
       text-shadow:0 0 8px rgba(0,0,0,.6)}
  .flame{color:#ffd24a;text-shadow:0 0 8px #ff9b2e,0 0 16px #ff6a00;animation:none}
  #msg{margin-top:18px;font-size:clamp(22px,5vw,42px);font-weight:700;
       background:linear-gradient(90deg,#ff5f6d,#ffc371,#5ffbf1,#c79bff,#ff5f6d);background-size:300% 100%;
       -webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 6s linear infinite}
  @keyframes shine{to{background-position:300% 0}}
  #sub{color:#6b7390;font-family:system-ui,sans-serif;font-size:13px;margin-top:7px}
  canvas#cf{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="cf"></canvas>
<div id="scene">
  <pre id="art"></pre>
  <div id="msg">Happy Birthday!</div>
  <div id="sub">click anywhere for confetti 🎉</div>
</div>
<script>
const art = document.getElementById('art');

// Candle columns (0-based) on the flame/wick rows, sitting on the top tier.
const FLAME_COLS = [6, 10, 14, 18, 22];
const ROWW = 31;                       // total row width for centring

const rep = (c, n) => c.repeat(n);
const center = (s, n) => {
  const pad = n - s.length, l = pad >> 1;
  return rep(' ', l) + s + rep(' ', pad - l);
};
// Pad a line to ROWW and left-center it so the cake stays centred.
const padc = (s) => center(s, ROWW);

// Build the wick/candle rows: a glyph at each FLAME_COL, spaces elsewhere.
function colsRow(glyph) {
  let s = rep(' ', ROWW).split('');
  for (const c of FLAME_COLS) s[c] = glyph;
  return s.join('');
}

// ---- static cake body (each entry: [text, cssColor]) ----
const CAKE = [
  [colsRow('|'), '#9aa0b5'],                                    // wicks
  ['  ' + rep('_', 27),                       '#ff9ec7'],       // top-tier rim
  [' .' + rep('~', 27) + '.',                 '#ff7fb0'],       // frosting drip
  [' |' + center('HAPPY  BIRTHDAY', 27) + '|','#ffe08a'],       // message band
  [' |' + rep(':', 27) + '|',                 '#e3a268'],       // sponge
  ['.' + rep('_', 29) + '.',                  '#ff9ec7'],       // bottom-tier rim
  ['|' + rep('~', 29) + '|',                  '#ff7fb0'],       // frosting drip
  ['CHERRIES', '#e3a268'],                                      // cherry row (special)
  ['|' + rep(':', 29) + '|',                  '#e3a268'],       // sponge
  ["'" + rep('_', 29) + "'",                  '#caa6c9'],       // bottom edge
  [' ' + rep('=', 29) + ' ',                  '#b9c2d0'],       // plate top
  ['(' + rep('_', 29) + ')',                  '#8b94a6'],       // plate
];

// Candle bodies get individual colours; cherries are red dots on the tan band.
const CANDLE_COLORS = ['#ff6b6b', '#6bc5ff', '#9bffb0', '#ffd166', '#c79bff'];

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildHTML() {
  const lines = [];

  // Flame row (animated): a <span class="flame"> at each candle column.
  {
    const cells = rep(' ', ROWW).split('');
    FLAME_COLS.forEach((c, i) => { cells[c] = '\0' + i; });   // placeholder marker
    lines.push(cells.map(ch => ch[0] === '\0'
      ? `<span class="flame" data-f="${ch.slice(1)}">^</span>`
      : esc(ch)).join(''));
  }

  CAKE.forEach(([text, color], idx) => {
    // Candle/wick row: colour each stick distinctly (already ROWW wide).
    if (idx === 0) {
      lines.push(text.split('').map((ch, x) => {
        const ci = FLAME_COLS.indexOf(x);
        return ci >= 0 ? `<span style="color:${CANDLE_COLORS[ci]}">|</span>` : esc(ch);
      }).join(''));
      return;
    }
    // Tan sponge band with red cherries dotted across it (already ROWW wide).
    if (text === 'CHERRIES') {
      const inner = rep(' ', 29).split('');
      for (let c = 2; c < 29; c += 4) inner[c] = '*';
      const html = inner.map(ch => ch === '*'
        ? '<span style="color:#ff5d6c">o</span>'
        : `<span style="color:#e3a268">${esc(ch)}</span>`).join('');
      lines.push(`<span style="color:#e3a268">|</span>${html}<span style="color:#e3a268">|</span>`);
      return;
    }
    lines.push(`<span style="color:${color}">${esc(padc(text))}</span>`);
  });

  return lines.join('\n');
}

art.innerHTML = buildHTML();

// ---- flame flicker animation ----
const FLAMES = ['^', '*', '.', '\'', ':', '^'];
const flameEls = [...document.querySelectorAll('.flame')];
function flicker() {
  for (const el of flameEls) {
    el.textContent = FLAMES[(Math.random() * FLAMES.length) | 0];
    const h = 36 + Math.random() * 18;               // gold -> orange
    el.style.color = `hsl(${h},100%,${58 + Math.random() * 14}%)`;
  }
}
setInterval(flicker, 110);

// ---- confetti ----
const cf = document.getElementById('cf'), cc = cf.getContext('2d');
function rs(){ cf.width = innerWidth; cf.height = innerHeight; } addEventListener('resize', rs); rs();
let bits = [];
function burst(x, y){
  const cols = ['#ff5f6d','#ffc371','#5ffbf1','#c79bff','#9bffb0','#ffd166'];
  for (let i = 0; i < 130; i++) bits.push({
    x, y, vx:(Math.random()*2-1)*7, vy:Math.random()*-9-2, g:.28+Math.random()*.12,
    s:3+Math.random()*4, c:cols[(Math.random()*cols.length)|0], r:Math.random()*6, life:130
  });
}
function tick(){
  cc.clearRect(0,0,cf.width,cf.height);
  bits = bits.filter(b => b.life-- > 0);
  for (const b of bits){
    b.vy += b.g; b.x += b.vx; b.y += b.vy; b.r += .18;
    cc.save(); cc.translate(b.x, b.y); cc.rotate(b.r);
    cc.fillStyle = b.c; cc.globalAlpha = Math.max(0, b.life/130);
    cc.fillRect(-b.s/2, -b.s/2, b.s, b.s*1.6); cc.restore();
  }
  cc.globalAlpha = 1; requestAnimationFrame(tick);
}
tick();
addEventListener('click', e => burst(e.clientX, e.clientY));
setTimeout(() => burst(innerWidth/2, innerHeight*.42), 500);
setInterval(() => burst(Math.random()*innerWidth, innerHeight*.3), 2800);
</script>
</body>
</html>
